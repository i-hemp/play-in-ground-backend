services:
  - type: web
    name: play-in-ground-backend-nodejs
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
